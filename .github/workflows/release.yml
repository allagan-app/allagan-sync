name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 9.0.x

      - name: Download Dalamud
        run: |
          curl -sL https://goatcorp.github.io/dalamud-distrib/latest.zip -o latest.zip
          mkdir -p .dalamud
          unzip -o latest.zip -d .dalamud

      - name: Build
        env:
          DALAMUD_HOME: ${{ github.workspace }}/.dalamud
        run: dotnet build AllaganSync.slnx --configuration Release

      - name: Prepare release assets
        id: assets
        run: |
          zip_path=$(find AllaganSync/bin -name "latest.zip" -type f | head -1)
          if [ -z "$zip_path" ]; then echo "latest.zip not found"; exit 1; fi
          icon_path="$(cd "$(dirname "assets/icon.png")" && pwd)/$(basename "assets/icon.png")"
          if [ ! -f "$icon_path" ]; then echo "icon.png not found"; exit 1; fi
          echo "zip_path=$zip_path" >> "$GITHUB_OUTPUT"
          echo "icon_path=$icon_path" >> "$GITHUB_OUTPUT"

      - name: Create draft release (if missing)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if ! gh release view "${{ github.ref_name }}" > /dev/null 2>&1; then
            gh release create "${{ github.ref_name }}" --title "${{ github.ref_name }}" --draft --generate-notes
          fi

      - name: Upload assets to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.ref_name }}" \
            "${{ steps.assets.outputs.zip_path }}" \
            "${{ steps.assets.outputs.icon_path }}" \
            --clobber

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release edit "${{ github.ref_name }}" --draft=false --latest
